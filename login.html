<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="loginfusionstyle.css">
    
    <title>MusicGround - Iniciar sesión</title>
    
    <style>
      
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        
        .back-home a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .back-home a:hover {
            background: rgba(0, 0, 0, 0.8);
            transform: translateX(-3px);
        }
        
      
        #login-view {
            position: relative;
            width: 100%;
            height: auto;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }
        
        #login-view .container {
            margin: 40px auto;
            top: 0;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="back-home">
        <a href="home.html">
            <i class='bx bx-arrow-back'></i> Volver al inicio
        </a>
    </div>
    
    <div id="login-view" class="view active">
        <div class="container" id="container">
            <div class="form-container sign-up-container">
                <form action="#" onsubmit="event.preventDefault(); handleSignUp()">
                    <h1 data-i18n="createAccount">Crear Cuenta</h1>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                        <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                    </div>
                    <span data-i18n="orUseEmail">O usa un email asociado para registrar</span>
                    <input type="text" placeholder="Name" id="signup-name" required data-i18n="name" />
                    <input type="email" placeholder="Email" id="signup-email" required data-i18n="email" />
                    <input type="password" placeholder="Password" id="signup-password" required data-i18n="password" />
                    <button type="submit" data-i18n="signUp">Sign Up</button>
                </form>
            </div>
            
            <div class="form-container sign-in-container">
                <form action="#" onsubmit="event.preventDefault(); handleSignIn()">
                    <h1 data-i18n="signIn">Sign in</h1>
                    <div class="social-container">
                        <a href="#" class="social"><i class="fab fa-google"></i></a>
                        <a href="#" class="social"><i class="fa-brands fa-x-twitter"></i></a>
                        <a href="#" class="social"><i class="fa-brands fa-instagram"></i></a>


                    </div>
                    <span data-i18n="orUseAccount">O usa tu cuenta Asociada</span>
                    <input type="email" placeholder="Email" id="signin-email" required data-i18n="email" />
                    <input type="password" placeholder="Password" id="signin-password" required data-i18n="password" />
                    <a href="#" data-i18n="forgotPassword">Olvidaste la clave?</a>
                    <button type="submit" data-i18n="signIn">Sign In</button>
                </form>
            </div>
            
            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1 data-i18n="welcomeBack">Bienvenido de Nuevo!</h1>
                        <p data-i18n="keepConnected">Para mantenerte conectado por favor usa un perfil asociado</p>
                        <button class="ghost" id="signIn" data-i18n="signIn">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1 data-i18n="helloFriend">Hola Artista!</h1>
                        <p data-i18n="enterPersonalDetails">Artista, ingresa tus datos para empezar el viaje</p>
                        <button class="ghost" id="signUp" data-i18n="signUp">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-controls">
        <div class="controls-container">
            <div class="language-selector">
                <button class="lang-btn" data-lang="es" onclick="setLanguage('es')">🇪🇸 Español</button>
                <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">🇺🇸 English</button>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i class="bx bx-moon"></i>
            </button>
        </div>
    </div>

    <script src="languages.js"></script>
    <script src="theme.js"></script>
    <script src="login.js"></script>
</body>
</html>
